<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Totally Normal File</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video id="rick" src="rick.mp4" autoplay muted playsinline></video>

  <script>
    const vid = document.getElementById('rick');

    // Try to unmute after autoplay starts (some browsers allow this)
    vid.addEventListener('play', () => {
      vid.muted = false;
    });

    // Try to go fullscreen (will only work if browser allows it)
    vid.addEventListener('click', () => {
      if (vid.requestFullscreen) vid.requestFullscreen();
      else if (vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
      else if (vid.msRequestFullscreen) vid.msRequestFullscreen();
    });
  </script>
</body>
</html>
